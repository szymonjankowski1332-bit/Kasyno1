<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Frecas Casino</title>

<style>
body {
margin:0;
font-family:Arial;
background: radial-gradient(circle,#111,#000);
color:white;
text-align:center;
}

/* HEADER */
header {
padding:20px;
font-size:28px;
background:#000;
color:gold;
letter-spacing:2px;
border-bottom:1px solid gold;
}

/* LOGIN */
.screen{display:none;}
.active{display:block;}

input,button {
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:gold;
cursor:pointer;
}

/* LOBBY */
.games{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
width:200px;
box-shadow:0 0 15px rgba(255,215,0,0.2);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

/* BALANCE */
.balance{
margin:15px;
color:gold;
}

/* ROULETTE TABLE */
.table{
margin:20px auto;
width:300px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
}

.cell{
padding:15px;
border-radius:5px;
cursor:pointer;
}

.red{background:#a00;}
.black{background:#111;border:1px solid #555;}

#wheel{
width:200px;
height:200px;
border-radius:50%;
margin:20px auto;
background:conic-gradient(red 0 50%, black 50% 100%);
transition:transform 4s cubic-bezier(.17,.67,.83,.67);
}

/* BLACKJACK */
.cards{
margin:20px;
font-size:24px;
}

/* LIVE */
.live{
margin:20px;
padding:20px;
background:#111;
border:1px solid gold;
border-radius:10px;
}

/* FEED */
.feed{
position:fixed;
right:10px;
top:100px;
background:#111;
padding:10px;
font-size:12px;
border:1px solid gold;
}

/* ADMIN */
#admin{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border:1px solid gold;
}
</style>
</head>

<body>

<header>🎰 FRECAS CASINO</header>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2>Wejdź do kasyna</h2>
<input id="nick" placeholder="nick">
<button onclick="login()">Wejdź</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<div class="balance">Saldo: <span id="balance">0</span> zł <button onclick="openAdmin()">⚙️</button></div>

<div class="games">
<div class="card" onclick="openGame('roulette')">🎡 Ruletka</div>
<div class="card" onclick="openGame('blackjack')">🃏 Blackjack</div>
<div class="card" onclick="openGame('live')">🔴 Live Casino</div>
</div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen">
<h2>Ruletka</h2>
<div id="wheel"></div>

<div class="table">
<div class="cell red" onclick="bet('red')"></div>
<div class="cell black" onclick="bet('black')"></div>
<div class="cell red" onclick="bet('red')"></div>
</div>

<p id="r"></p>
<button onclick="back()">⬅️</button>
</div>

<!-- BLACKJACK -->
<div id="blackjack" class="screen">
<h2>Blackjack</h2>
<div class="cards" id="player"></div>
<div class="cards" id="dealer"></div>
<button onclick="start()">Start</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<button onclick="back()">⬅️</button>
</div>

<!-- LIVE -->
<div id="live" class="screen">
<div class="live">
🔴 LIVE DEALER<br><br>
Krupier: Anna<br>
Stół VIP<br><br>
<button onclick="liveBet()">Postaw 100 zł</button>
<p id="liveResult"></p>
</div>
<button onclick="back()">⬅️</button>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- ADMIN -->
<div id="admin">
<input id="pass" placeholder="hasło"><br><br>
<input id="target" placeholder="nick"><br><br>
<input id="amount" placeholder="kwota"><br><br>
<button onclick="addMoney()">Dodaj</button>
</div>

<script>

let users=JSON.parse(localStorage.getItem("users")||"{}");
let currentUser="";

function login(){
let n=nick.value;
if(!n)return;
currentUser=n;
if(!users[n]) users[n]=1000;
show("lobby");
update();
}

function show(id){
document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openGame(g){show(g);}
function back(){show("lobby");}

function update(){
balance.innerText=users[currentUser];
localStorage.setItem("users",JSON.stringify(users));
}

/* ROULETTE */
function bet(color){
if(users[currentUser]<50)return;
users[currentUser]-=50;
let deg=Math.random()*360+720;
wheel.style.transform="rotate("+deg+"deg)";
setTimeout(()=>{
let win=Math.random()>0.5;
if(win){users[currentUser]+=100;r.innerText="WYGRANA";}
else r.innerText="PRZEGRANA";
update();
},4000);
}

/* BLACKJACK */
let p=[],d=[];
function draw(){return Math.floor(Math.random()*10)+1;}
function sum(a){return a.reduce((x,y)=>x+y,0);}

function start(){
if(users[currentUser]<100)return;
users[currentUser]-=100;
p=[draw(),draw()];
d=[draw(),draw()];
updateBJ();update();
}

function updateBJ(){
player.innerText="Ty: "+p.join(",")+" = "+sum(p);
dealer.innerText="Dealer: "+d[0]+", ?";
}

function hit(){p.push(draw());updateBJ();}
function stand(){
while(sum(d)<17)d.push(draw());
dealer.innerText="Dealer: "+d.join(",")+" = "+sum(d);
if(sum(p)<=21&&(sum(p)>sum(d)||sum(d)>21)){users[currentUser]+=200;}
update();
}

/* LIVE */
function liveBet(){
if(users[currentUser]<100)return;
users[currentUser]-=100;
if(Math.random()>0.5){
users[currentUser]+=250;
liveResult.innerText="WIN!";
}else liveResult.innerText="LOSE";
update();
}

/* ADMIN */
function openAdmin(){admin.style.display="block";}
function addMoney(){
if(pass.value!=="admin123")return;
if(!users[target.value]) users[target.value]=0;
users[target.value]+=parseInt(amount.value);
update();
admin.style.display="none";
}

/* FEED */
setInterval(()=>{
let names=["Kuba","Anna","Mati","PlayerX","Lucky"];
let n=names[Math.random()*names.length|0];
let w=Math.floor(Math.random()*5000);
feed.innerHTML=n+" wygrał "+w+" zł";
},2000);

</script>

</body>
</html>
