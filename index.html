<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Casino PRO+</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle,#0a0a1a,#000);
    color:white;
    text-align:center;
}

header {
    padding:15px;
    font-size:26px;
    background:#111;
    box-shadow:0 0 20px #00ffcc;
}

.balance {
    margin:10px;
    color:#00ffcc;
}

nav button {
    margin:5px;
    padding:10px 20px;
    border:none;
    background:#00ffcc;
    border-radius:10px;
    cursor:pointer;
}

.game {display:none;}
.active {display:block;}

#wheel {
    margin:30px auto;
    width:200px;
    height:200px;
    border-radius:50%;
    border:10px solid #333;
    background: conic-gradient(red 0 50%, black 50% 100%);
    transition: transform 3s ease-out;
}

</style>
</head>

<body>

<header>🎰 CASINO PRO+</header>

<div>
    Gracz: <input id="nick" placeholder="nick">
    <button onclick="login()">Zaloguj</button>
</div>

<div class="balance">
    Saldo: <span id="balance">0</span> zł
    <button onclick="openAdmin()">⚙️</button>
</div>

<nav>
    <button onclick="showGame('roulette')">Ruletka</button>
</nav>

<!-- RULETKA -->
<div id="roulette" class="game active">
    <div id="wheel"></div>
    <button onclick="spin()">Zakręć (50 zł)</button>
    <p id="result"></p>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:20px;">
    <input id="pass" placeholder="hasło"><br><br>
    <input id="target" placeholder="nick"><br><br>
    <input id="amount" placeholder="kwota"><br><br>
    <button onclick="addMoney()">Dodaj</button>
</div>

<script>

let currentUser = "";
let users = JSON.parse(localStorage.getItem("users") || "{}");

function login(){
    let nick = document.getElementById("nick").value;
    if(!nick) return;

    currentUser = nick;

    if(!users[nick]){
        users[nick] = 1000;
    }

    update();
}

function update(){
    document.getElementById("balance").innerText = users[currentUser] || 0;
    localStorage.setItem("users", JSON.stringify(users));
}

function showGame(g){
    document.querySelectorAll(".game").forEach(x=>x.classList.remove("active"));
    document.getElementById(g).classList.add("active");
}

// RULETKA ANIMACJA
function spin(){
    if(users[currentUser] < 50) return alert("Brak kasy");

    users[currentUser] -= 50;

    let wheel = document.getElementById("wheel");
    let deg = Math.floor(Math.random()*360)+720;

    wheel.style.transform = "rotate("+deg+"deg)";

    setTimeout(()=>{
        let win = Math.random() > 0.5;
        if(win){
            users[currentUser] += 100;
            document.getElementById("result").innerText = "WYGRANA!";
        } else {
            document.getElementById("result").innerText = "PRZEGRANA";
        }
        update();
    },3000);
}

// ADMIN
function openAdmin(){
    document.getElementById("admin").style.display="block";
}

function addMoney(){
    let pass = document.getElementById("pass").value;
    if(pass !== "admin123") return alert("Złe hasło");

    let t = document.getElementById("target").value;
    let a = parseInt(document.getElementById("amount").value);

    if(!users[t]) users[t]=0;
    users[t]+=a;

    update();
    document.getElementById("admin").style.display="none";
}

</script>

</body>
</html>
