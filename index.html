<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Casino Pro</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b1a;
    color:white;
    text-align:center;
}

header {
    padding:15px;
    background:#111;
    font-size:24px;
    box-shadow:0 0 20px #00ffcc;
}

nav button {
    margin:5px;
    padding:10px 20px;
    background:#00ffcc;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.balance {
    margin:15px;
    font-size:20px;
    color:#00ffcc;
}

.game {
    display:none;
    margin-top:20px;
}

.active {
    display:block;
}

.slot {
    font-size:50px;
}

.live-box {
    background:#222;
    padding:20px;
    border-radius:10px;
    margin:20px;
}

</style>
</head>

<body>

<header>🎰 CASINO PRO</header>

<div class="balance">
    Saldo: <span id="balance">0</span> zł 
    <button onclick="openAdmin()">⚙️</button>
</div>

<nav>
    <button onclick="showGame('slots')">Sloty</button>
    <button onclick="showGame('roulette')">Ruletka</button>
    <button onclick="showGame('blackjack')">Blackjack</button>
    <button onclick="showGame('live')">Live</button>
</nav>

<!-- SLOTY -->
<div id="slots" class="game active">
    <div class="slot" id="slot">🍒 🍒 🍒</div>
    <button onclick="spin()">SPIN (50 zł)</button>
</div>

<!-- RULETKA -->
<div id="roulette" class="game">
    <h2>Ruletka</h2>
    <button onclick="bet('red')">Czerwone</button>
    <button onclick="bet('black')">Czarne</button>
    <p id="rouletteResult"></p>
</div>

<!-- BLACKJACK -->
<div id="blackjack" class="game">
    <h2>Blackjack</h2>
    <div id="player"></div>
    <div id="dealer"></div>
    <button onclick="startBJ()">Start (100 zł)</button>
    <button onclick="hit()">Hit</button>
    <button onclick="stand()">Stand</button>
</div>

<!-- LIVE -->
<div id="live" class="game">
    <div class="live-box">
        🔴 LIVE CASINO<br><br>
        Krupier: Anna<br><br>
        <button onclick="liveWin()">Postaw 100 zł</button>
        <p id="liveResult"></p>
    </div>
</div>

<!-- PANEL ADMINA -->
<div id="adminPanel" style="display:none; background:#111; padding:20px; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:10px;">
    <h3>Panel admina</h3>
    <input id="adminPass" placeholder="Hasło"><br><br>
    <input id="amount" placeholder="Ile dodać"><br><br>
    <button onclick="addMoney()">Dodaj</button>
</div>

<script>

// SALDO
let balance = localStorage.getItem("balance") || 1000;
updateBalance();

function updateBalance(){
    document.getElementById("balance").innerText = balance;
    localStorage.setItem("balance", balance);
}

// ADMIN
function openAdmin(){
    document.getElementById("adminPanel").style.display = "block";
}

function addMoney(){
    let pass = document.getElementById("adminPass").value;

    if(pass !== "1234"){
        alert("Złe hasło!");
        return;
    }

    let amount = parseInt(document.getElementById("amount").value);
    if(!amount) return;

    balance = parseInt(balance) + amount;
    updateBalance();

    document.getElementById("adminPanel").style.display = "none";
}

// ZMIANA GRY
function showGame(game){
    document.querySelectorAll(".game").forEach(g=>g.classList.remove("active"));
    document.getElementById(game).classList.add("active");
}

// SLOTY
function spin(){
    if(balance < 50) return alert("Brak kasy");

    balance -= 50;
    let symbols = ["🍒","🍋","💎","7️⃣"];
    let s = [
        symbols[Math.floor(Math.random()*4)],
        symbols[Math.floor(Math.random()*4)],
        symbols[Math.floor(Math.random()*4)]
    ];

    document.getElementById("slot").innerText = s.join(" ");

    if(s[0]==s[1] && s[1]==s[2]){
        balance += 300;
        alert("WYGRANA!");
    }

    updateBalance();
}

// RULETKA
function bet(color){
    if(balance < 50) return alert("Brak kasy");

    balance -= 50;
    let result = Math.random() > 0.5 ? "red" : "black";

    if(result === color){
        balance += 100;
        document.getElementById("rouletteResult").innerText = "Wygrana!";
    } else {
        document.getElementById("rouletteResult").innerText = "Przegrana!";
    }

    updateBalance();
}

// BLACKJACK
let player = [], dealer = [];

function draw(){
    return Math.floor(Math.random()*10)+1;
}

function sum(arr){
    return arr.reduce((a,b)=>a+b,0);
}

function startBJ(){
    if(balance < 100) return alert("Brak kasy");

    balance -= 100;
    player = [draw(), draw()];
    dealer = [draw(), draw()];

    updateBJ();
    updateBalance();
}

function updateBJ(){
    document.getElementById("player").innerText = "Ty: " + player.join(", ") + " = " + sum(player);
    document.getElementById("dealer").innerText = "Dealer: " + dealer[0] + ", ?";
}

function hit(){
    player.push(draw());
    updateBJ();
}

function stand(){
    while(sum(dealer) < 17){
        dealer.push(draw());
    }

    let p = sum(player);
    let d = sum(dealer);

    document.getElementById("dealer").innerText = "Dealer: " + dealer.join(", ") + " = " + d;

    if(p <= 21 && (p > d || d > 21)){
        balance += 200;
        alert("Wygrana!");
    } else {
        alert("Przegrana!");
    }

    updateBalance();
}

// LIVE
function liveWin(){
    if(balance < 100) return alert("Brak kasy");

    balance -= 100;

    if(Math.random() > 0.5){
        balance += 250;
        document.getElementById("liveResult").innerText = "LIVE WIN!";
    } else {
        document.getElementById("liveResult").innerText = "LIVE LOSE";
    }

    updateBalance();
}

</script>

</body>
</html>
