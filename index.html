<body>

<header>🎰 FRECAS CASINO DEV</header>

<div id="login" class="screen active">

</div>

<div id="lobby" class="screen">

<div class="games">
<div class="card" onclick="openGame('roulette')">🎡 Ruletka</div>
<div class="card" onclick="openGame('slots')">🎰 Sloty</div>
<div class="card" onclick="openGame('aviator')">✈️ Aviator</div>
</div>
</div>

<div id="gameScreen" class="screen"></div>

<script src="app.js"></script>
<script src="games/roulette.js"></script>
<script src="games/slots.js"></script>
<script src="games/aviator.js"></script>

</body>
</html>
