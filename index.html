<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Frecas Casino ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
text-align:center;
}

/* HEADER */
header{
padding:20px;
font-size:28px;
color:gold;
border-bottom:1px solid #333;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;padding:20px;}

/* LOBBY */
.games{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
width:220px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
}

/* BALANCE */
.balance{color:gold;margin:10px;}

/* ROULETTE TABLE */
.grid{
display:grid;
grid-template-columns:repeat(12,50px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
padding:12px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.red{background:#a00;}
.black{background:#111;border:1px solid #555;}
.green{background:green;}

.cell:hover{outline:2px solid gold;}

/* SLOT */
.slot{
font-size:50px;
margin:20px;
transition:0.3s;
}

/* ADMIN */
#admin{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
}
</style>
</head>

<body>

<header>🎰 FRECAS CASINO ULTRA</header>

<div id="login" class="screen active">
<input id="nick" placeholder="nick">
<button onclick="login()">Wejdź</button>
</div>

<div id="lobby" class="screen">
<div class="balance">Saldo: <span id="bal"></span> zł <button onclick="adminOpen()">⚙️</button></div>

<div class="games">
<div class="card" onclick="show('roulette')">🎡 Ruletka</div>
<div class="card" onclick="show('slots')">🎰 Sloty</div>
</div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen">
<h2>Ruletka</h2>

<div class="grid" id="table"></div>

<p>Postawione: <span id="betInfo"></span></p>
<button onclick="spin()">SPIN</button>
<button onclick="back()">⬅️</button>
<p id="result"></p>
</div>

<!-- SLOT -->
<div id="slots" class="screen">
<div class="slot" id="slot">🍒 🍒 🍒</div>
<button onclick="spinSlot()">SPIN (50)</button>
<button onclick="back()">⬅️</button>
</div>

<!-- ADMIN -->
<div id="admin">
<input id="pass" placeholder="hasło"><br>
<input id="user" placeholder="nick"><br>
<input id="money" placeholder="kwota"><br>
<button onclick="add()">Dodaj</button>
</div>

<script>
let users=JSON.parse(localStorage.getItem("users")||"{}");
let u="";
let bets={};

/* LOGIN */
function login(){
u=nick.value;
if(!users[u]) users[u]=1000;
show("lobby");update();
}

/* UI */
function show(id){
document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function back(){show("lobby");}
function update(){
bal.innerText=users[u];
localStorage.setItem("users",JSON.stringify(users));
}

/* ROULETTE TABLE GENERATE */
let table=document.getElementById("table");
for(let i=0;i<=36;i++){
let d=document.createElement("div");
d.innerText=i;
d.className="cell "+(i==0?"green":(i%2?"red":"black"));
d.onclick=()=>placeBet(i);
table.appendChild(d);
}

function placeBet(n){
if(users[u]<10)return alert("Brak kasy");
users[u]-=10;
bets[n]=(bets[n]||0)+10;
betInfo.innerText=JSON.stringify(bets);
update();
}

/* SPIN */
function spin(){
let win=Math.floor(Math.random()*37);
result.innerText="Wynik: "+win;

if(bets[win]){
let winAmount=bets[win]*35;
users[u]+=winAmount;
result.innerText+=" WYGRANA "+winAmount+" zł";
}

bets={};
betInfo.innerText="";
update();
}

/* SLOT */
function spinSlot(){
if(users[u]<50)return;
users[u]-=50;

let s=["🍒","🍋","💎","7️⃣"];
let interval=setInterval(()=>{
slot.innerText=s[Math.random()*4|0]+" "+s[Math.random()*4|0]+" "+s[Math.random()*4|0];
},100);

setTimeout(()=>{
clearInterval(interval);
let r=[s[Math.random()*4|0],s[Math.random()*4|0],s[Math.random()*4|0]];
slot.innerText=r.join(" ");
if(r[0]==r[1]&&r[1]==r[2]) users[u]+=300;
update();
},1000);
}

/* ADMIN */
function adminOpen(){admin.style.display="block";}
function add(){
if(pass.value!=="admin123")return;
if(!users[user.value]) users[user.value]=0;
users[user.value]+=parseInt(money.value);
update();
admin.style.display="none";
}
</script>

</body>
</html>
