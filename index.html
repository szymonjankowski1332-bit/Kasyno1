<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Frecas Casino</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🎰 FRECAS CASINO</header>

<div id="login" class="screen active">
<input id="nick" placeholder="nick">
<button onclick="login()">Wejdź</button>
</div>

<div id="lobby" class="screen">
<div class="balance">Saldo: <span id="bal"></span> zł</div>

<div class="games">
<div class="card" onclick="show('roulette')">🎡 Ruletka</div>
<div class="card" onclick="show('slots')">🎰 Sloty</div>
</div>
</div>

<div id="roulette" class="screen">
<h2>Ruletka</h2>
<div id="table" class="grid"></div>
<p id="result"></p>
<button onclick="spin()">SPIN</button>
<button onclick="back()">⬅️</button>
</div>

<div id="slots" class="screen">
<div id="slot" class="slot">🍒 🍒 🍒</div>
<button onclick="spinSlot()">SPIN</button>
<button onclick="back()">⬅️</button>
</div>

<script src="script.js"></script>

</body>
</html>
