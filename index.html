<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Frecas Casino</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header style="text-align:center;font-size:28px;padding:15px;">
🎰 FRECAS CASINO
</header>

<!-- LOGIN -->
<div id="login" class="screen" style="display:block;text-align:center;">
<input id="nick" placeholder="nick">
<br><br>
<button onclick="login()">Start</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen" style="display:none;text-align:center;">
<h2>Lobby</h2>

<p>Saldo: <span id="bal"></span> zł</p>

<button onclick="openAdmin()">👑 Admin</button>

<div id="feed" style="margin:10px;"></div>

<br>

<div class="games">
<button onclick="openGame('roulette')">🎡 Ruletka</button>
<button onclick="openGame('slots')">🎰 Sloty</button>
<button onclick="openGame('aviator')">✈️ Aviator</button>
</div>

</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen" style="display:none;text-align:center;"></div>

<!-- ADMIN PANEL -->
<div id="admin" class="screen" style="display:none;text-align:center;">
<h2>👑 Panel Admina</h2>

<input id="targetUser" placeholder="nick gracza">
<br><br>
<input id="amount" placeholder="kwota">
<br><br>

<button onclick="addMoney()">Dodaj kasę</button>
<br><br>
<button onclick="show('lobby')">⬅️ Powrót</button>

<p id="adminMsg"></p>
</div>

<!-- SCRIPTS (TYLKO RAZ!) -->
<script src="app.js"></script>
<script src="games/roulette.js"></script>
<script src="games/slots.js"></script>
<script src="games/aviator.js"></script>

</body>
</html>
